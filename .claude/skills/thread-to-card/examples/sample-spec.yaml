meta:
  title: "Superpowers\n에이전트 코딩의\n끝판왕"
  subtitle: "스펙부터 짜고, 계획 세우고, 서브에이전트로 구현까지"
  series: "github-recommendation"
  tag: "github-recommendation"
  author: ""
  author_handle: ""
  total_slides: 7
  cover_illustration: "superpowers-cover.png"
  source_tip: 8
  source_file: "../threads/github/08-superpowers.md"
  created_at: "2026-03-04"

slides:
  - slide: 1
    layout: cover
    title: "Superpowers\n에이전트 코딩의\n끝판왕"
    subtitle: "스펙부터 짜고, 계획 세우고, 서브에이전트로 구현까지"
    blocks: []

  - slide: 2
    layout: problem
    title: "에이전트한테 코딩 시키면"
    subtitle: "이런 문제가 생긴다"
    blocks:
      - type: card-list
        items:
          - emoji: "🎯"
            title: "스펙 없이 바로 코딩"
            description: "뭘 만들지 정하기도 전에\n코드부터 쏟아낸다"
          - emoji: "🔍"
            title: "리뷰 없는 코드"
            description: "품질 확인 없이\n다음 작업으로 넘어간다"
          - emoji: "🧪"
            title: "테스트 부재"
            description: "동작 확인 없이 완성이라고\n보고한다"

  - slide: 3
    layout: hero
    title: "Superpowers"
    subtitle: "에이전트 코딩 스킬 프레임워크"
    blocks:
      - type: number-stat
        value: "~70K"
        label: "GitHub Stars"
        highlight_word: "Stars"
      - type: info-box
        title: "멀티 플랫폼 지원"
        content: "Claude Code, Cursor, Codex, OpenCode 전부 지원한다"

  - slide: 4
    layout: explanation
    title: "Subagent-Driven\nDevelopment"
    subtitle: "큰 작업을 작은 태스크로 쪼개서 처리한다"
    blocks:
      - type: step-list
        items:
          - step: 1
            emoji: "📋"
            title: "계획 수립"
            description: "뭘 만들지 물어보고 설계한다"
          - step: 2
            emoji: "✂️"
            title: "태스크 분할"
            description: "2~5분짜리 작은 단위로 쪼갠다"
          - step: 3
            emoji: "🤖"
            title: "서브에이전트 실행 + 리뷰"
            description: "태스크마다 서브에이전트가 코딩하고\n2단계 리뷰를 거친다"

  - slide: 5
    layout: split
    title: "TDD를\n강제한다"
    subtitle: "테스트 없으면 코드를 삭제한다"
    blocks:
      - type: card-list
        items:
          - emoji: "🔴"
            title: "RED"
            description: "실패하는 테스트를 먼저 쓴다"
          - emoji: "🟢"
            title: "GREEN"
            description: "테스트를 통과하는 코드를 쓴다"
          - emoji: "🔵"
            title: "REFACTOR"
            description: "코드를 정리하고 커밋한다"

  - slide: 6
    layout: howto
    title: "설치는 두 줄"
    subtitle: "Claude Code 기준"
    blocks:
      - type: terminal-block
        title: "Terminal"
        lines:
          - type: comment
            text: "# Superpowers 설치"
          - type: command
            text: "> /plugin marketplace add obra/superpowers-marketplace"
          - type: command
            text: "> /plugin install superpowers@superpowers-marketplace"
      - type: tip-box
        label: "Tip"
        content: "설치하면 에이전트가 상황에 맞는 스킬을 알아서 쓴다"

  - slide: 7
    layout: closing
    title: "에이전트 코딩,\n이제 체계적으로"
    subtitle: "Superpowers로 시작하자"
    blocks:
      - type: card-list
        items:
          - emoji: "📋"
            title: "스펙 → 계획 → 구현"
            description: "단계별로 진행한다"
          - emoji: "🤖"
            title: "서브에이전트 자동 분배"
            description: "태스크를 쪼개서 병렬 처리한다"
          - emoji: "🧪"
            title: "TDD 강제"
            description: "테스트 없으면 코드가 삭제된다"
      - type: highlight-banner
        content: "코드를 쓰기 전에 설계부터 하는 에이전트"
        bold_part: "설계부터 하는 에이전트"
